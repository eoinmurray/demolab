# demolab tasks — run `task` (no args) to list them.
# Toolchain: uv (Python), typst (publishing), go-task. No Node.
# Install go-task: https://taskfile.dev  (brew install go-task)
version: "3"

tasks:
  default:
    desc: List the available tasks
    cmds: [task --list-all]
    silent: true

  # ── setup ────────────────────────────────────────────────────────────────
  install:
    desc: "🛠  Install Python dependencies (uv)"
    cmds: [uv sync]

  version:
    desc: "🔖 Print the demolab engine version (demolab-engine/VERSION)"
    silent: true
    cmds: ["cat demolab-engine/VERSION"]

  # ── scaffolding ──────────────────────────────────────────────────────────
  scaffold:
    desc: "🏗  Lay down the working-tree structure (writings/ experiments/ tools/ artifacts/ + config) — non-destructive"
    silent: true
    cmds:
      - |
        # Copy the skeleton into the repo root without clobbering anything you already have
        # (--ignore-existing), so re-running is safe. The engine itself is never touched.
        rsync -a --ignore-existing demolab-engine/scaffold/skeleton/ ./
        echo "✓ scaffolded the folder structure. Add a writeup in writings/ and run 'task build'."
        echo "  (want a worked example instead? run 'task add-demo-content')"

  add-demo-content:
    desc: "🏗  Overlay the worked demo (experiments + writeups + artifacts) onto the scaffolded structure"
    silent: true
    deps: [scaffold]  # idempotent, so this works on a bare clone and layers cleanly if already scaffolded
    cmds:
      - |
        # Overlay the committed demo (the engine's own smoke-test fixture) on top of the skeleton.
        rsync -a demolab-engine/scaffold/demo/ ./
        echo "✓ added the demo content. Run 'task build' to publish it, or 'task clear-demo-content' to remove it."

  clear-demo-content:
    desc: "🧹 Remove the shipped demo content (paths in demolab-engine/scaffold/demo-manifest.json)"
    silent: true
    cmds:
      - |
        # Delete exactly the paths the demo created — nothing you authored is listed there.
        uv run python -c "import json,shutil,pathlib; \
          m=json.load(open('demolab-engine/scaffold/demo-manifest.json')); \
          [ (shutil.rmtree(p,ignore_errors=True) if pathlib.Path(p).is_dir() else pathlib.Path(p).unlink(missing_ok=True)) for p in m['paths'] ]; \
          print('✓ removed', len(m['paths']), 'demo paths')"

  deploy-setup:
    desc: "🚀 Opt in to GitHub Pages — copy the deploy workflow into .github/workflows/ (then enable Pages in Settings)"
    silent: true
    cmds:
      - |
        mkdir -p .github/workflows
        cp demolab-engine/deploy/deploy.yml .github/workflows/deploy.yml
        echo "✓ wrote .github/workflows/deploy.yml"
        echo "  Last step (a GitHub-UI click, can't be scripted):"
        echo "    Settings → Pages → Source: GitHub Actions"
        echo "  Then commit + push — the Action builds the site and deploys it."

  # ── the loop ─────────────────────────────────────────────────────────────
  run:
    desc: "▶  Run an experiment end-to-end, e.g. `task run -- exp000`"
    cmds: ["uv run python experiments/{{.CLI_ARGS}}.py"]

  new:
    desc: "✨ How to start a new experiment (hint — ask your coding agent)"
    silent: true
    cmds:
      - |
        echo "Experiments aren't scaffolded from a template — ask your coding agent."
        echo "It models a *working* skeleton on an existing pair:"
        echo "  experiments/expNNN.py  — a runner with real COMMANDS that stages artifacts/data/expNNN/"
        echo "  writings/expNNN.typ    — a #let meta + #let body that read that bundle via json()/image()"
        echo
        echo "Try: \"scaffold a new experiment expNNN that computes <thing>\""
        echo "See AGENTS.md (entry point) and demolab-engine/guides/RULES.md (how to add one)."

  # ── publishing ───────────────────────────────────────────────────────────
  dev:
    desc: "🔥 Serve the site with hot-reload + in-browser build errors (auto-picks a free port from 3000; override: task dev -- 3010)"
    cmds:
      # A Python dev server (demolab-engine/build/devserver.py) rebuilds via build.py on any
      # source change and serves artifacts/site/ with live-reload. Unlike `typst watch` it
      # re-globs each build (so new entries + decks appear without a restart) and surfaces a
      # failed compile as a full-screen overlay in the browser instead of only the terminal.
      - uv run python demolab-engine/build/devserver.py {{.CLI_ARGS}}

  dev:demo-site:
    desc: "🔎 Serve the shipped demo (demolab-engine/scaffold/demo) via the live engine — symlinked, no copies"
    cmds:
      - |
        set -e
        demo=demolab-engine/scaffold/demo
        skel=demolab-engine/scaffold/skeleton
        # Don't clobber a real dev sandbox at the root (task add-demo-content). Existing *symlinks*
        # from a prior run are fine (idempotent); real dirs are not.
        if { [ -e writings ] && [ ! -L writings ]; } || { [ -e artifacts/data ] && [ ! -L artifacts/data ]; }; then
          echo "✗ ./writings or ./artifacts/data already exists as real content (a dev sandbox?)." >&2
          echo "  Clear it first: task clear-demo-content  (or  rm -rf writings experiments tools artifacts)" >&2
          exit 1
        fi
        # The content contract is root-relative (/demolab-engine, /artifacts) and Typst's --root is
        # the repo root, so the demo's content has to be *reachable* from the root. We symlink it in
        # — one source of truth, no duplicated files — rather than copying, and tear the links down on
        # exit so the tree stays clean. Build outputs land in the git-excluded artifacts/site + pdfs.
        # We link the demo's *content* (writings + the data assets its figures embed) AND its
        # effective *config* — demolab.yaml + HOUSESTYLE.local.md live in the skeleton, so without
        # them the preview loses branding + collection labels/descriptions. (experiments/ + tools/
        # are only for *running* the demo, so they're not needed to serve.)
        ln -sfn "$demo/writings" writings
        mkdir -p artifacts
        ln -sfn "../$demo/artifacts/data" artifacts/data
        ln -sfn "$skel/demolab.yaml" demolab.yaml
        ln -sfn "$skel/HOUSESTYLE.local.md" HOUSESTYLE.local.md
        trap 'rm -f writings artifacts/data demolab.yaml HOUSESTYLE.local.md; rm -rf artifacts/site artifacts/pdfs; rmdir artifacts 2>/dev/null || true' EXIT
        echo "→ demo content + config symlinked from scaffold (edit it there; changes hot-reload)"
        uv run python demolab-engine/build/devserver.py {{.CLI_ARGS}}

  build:
    desc: "📦 Build the whole bundle → artifacts/site/ (web) + artifacts/pdfs/ (PDFs + book)"
    cmds: [uv run python demolab-engine/build/build.py]

  slides:
    desc: "🎞  Compile standalone Typst decks (writings/*.typ with no meta+body) to artifacts/pdfs/"
    silent: true
    cmds:
      - |
        mkdir -p artifacts/pdfs
        found=0
        for f in writings/*.typ; do
          [ -e "$f" ] || continue
          if grep -qE '^#let meta' "$f" && grep -qE '^#let body' "$f"; then continue; fi  # bundle entry
          id=$(basename "$f" .typ)
          typst compile --root . "$f" "artifacts/pdfs/$id.pdf" && echo "wrote artifacts/pdfs/$id.pdf"
          found=1
        done
        if [ "$found" -eq 0 ]; then echo "no standalone decks in writings/"; fi

  playground:
    desc: "🎛  Launch the interactive Streamlit demo (http://localhost:8501)"
    cmds: [uv run streamlit run experiments/playground.py]

  # ── quality & housekeeping ───────────────────────────────────────────────
  test:
    desc: "🧪 Run the Python test suite (pytest)"
    cmds: [uv run pytest]

  clean:
    desc: "🧹 Delete regenerable build output (temp/, artifacts/site/)"
    cmds: [rm -rf temp artifacts/site]
