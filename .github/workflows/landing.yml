name: Deploy the site (demo at root)

# Publishes to GitHub Pages at demolab.eoinmurray.info:
#   /  the shipped demo (artifacts/site/) + install scripts + CNAME
# The demo homepage carries an optional welcome block (demolab.yaml `welcome:`) in place of a
# separate landing page. A user's own lab deploy is separate and opt-in
# (demolab-engine/deploy/deploy.yml, added by `task deploy-setup`).
on:
  push:
    branches: [main]
    paths:
      - "demolab-engine/**"
      - ".github/workflows/landing.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  TYPST_VERSION: "0.15.0"  # match the engine's local toolchain

jobs:
  deploy:
    # Upstream only. Forks/templates inherit this file, but must never publish demolab's site to
    # their own Pages — so the job is skipped everywhere but the source repo.
    if: github.repository == 'eoinmurray/demolab'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Typst ${{ env.TYPST_VERSION }}
        run: |
          # Download the pinned release directly (deterministic, no third-party action to track).
          url="https://github.com/typst/typst/releases/download/v${TYPST_VERSION}/typst-x86_64-unknown-linux-musl.tar.xz"
          curl -fsSL "$url" | tar -xJ
          echo "$PWD/typst-x86_64-unknown-linux-musl" >> "$GITHUB_PATH"

      - name: Build the demo with the core engine
        run: |
          # Materialise the shipped demo at the repo root (skeleton + demo overlay), exactly as
          # `task add-demo-content` does, then compile it with the engine. build.py is stdlib-only
          # and the demo ships its rendered figures/videos, so no uv, runners, or deps are needed.
          rsync -a --exclude 'site/' demolab-engine/scaffold/skeleton/ ./
          rsync -a --exclude 'site/' demolab-engine/scaffold/demo/ ./
          python3 demolab-engine/build/build.py

      - name: Assemble the Pages tree (demo at /, installers at root)
        run: |
          rm -rf _site && cp -R artifacts/site/. _site/
          cp demolab-engine/scaffold/demo/site/install.sh demolab-engine/scaffold/demo/site/install.ps1 demolab-engine/scaffold/demo/site/CNAME _site/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
