# demolab config — every key is optional, but keep the file: it is also the lab marker
# (the `demolab` command finds the lab root by walking up to it, like git finding .git).
# Edit it to rebrand or curate collections; the engine fills in anything you omit
# (branding → defaults; a collection's label → its title-cased slug). Updates never touch
# this file.
name: Demolab
book-title: Demolab — the book
contents-title: Demolab — contents
# One-line tagline shown under the title on the homepage.
description: A lab notebook for computational science — reproducible results, published and citable.
# The lab's owner — shown as a byline under the homepage title and as <meta name="author">.
# The getting-started runbook offers to fill this from your git config. Contact is optional;
# if set, the byline links to it (mailto for an email, else a plain link).
# author: Your Name
# contact: you@example.com

# Optional custom landing page — not a config key: create a `landing.typ` at the repo root
# exporting `#let body = [...]` and the homepage renders it (web only) instead of the collection
# directory, below the title/tagline/byline above. Delete the file to get the directory back.
# See demolab-engine/scaffold/demo/site/landing.typ for a worked example.

# Homepage collections. Entries are grouped by their `collection:` meta field; this
# registry gives each collection a display label + description and sets the order. A
# collection with no entry here still works — its slug is just title-cased.
collection-order: [documentation, neuron-models, mujoco, streamlit, slides]
collections:
  documentation:
    label: Documentation
    description: "How demolab works: getting started, the always-on guides that set the conventions, and the on-demand runbooks the agent runs."
  neuron-models:
    label: Neuron models
    description: Integrate-and-fire neurons and the membrane biophysics behind them.
  mujoco:
    label: MuJoCo physics
    description: Rigid-body simulations rendered to video.
  streamlit:
    label: Interactive
    description: Live, slider-driven demos.
  slides:
    label: Talks & slides
    description: Deck PDFs from talks — paged-only, linked as PDF.
