# Shipped demo config — overlays skeleton/demolab.yaml when `demolab add-demo-content`
# materialises the demo. Lab-facing only: branding + the demo collections. The upstream
# landing page's hero lives in site/landing.typ (excluded from the overlay, copied to the
# root only by the Pages deploy), so it never lands in a user's lab.
name: Demolab
book-title: Demolab — the book
contents-title: Demolab — contents
description: A lab notebook for computational science — reproducible results, published and citable.

collection-order: [documentation]
collections:
  documentation:
    label: Documentation
    description: "How demolab works, in reading order: what it is and why, setting up, the contract, the mechanics of experiments and writeups, and running the lab day to day."
